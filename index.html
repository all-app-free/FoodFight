<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-overlay">
        <div class="rotate-card">
            <div class="phone-3d"><div class="phone-face"></div></div>
            <p>PLEASE ROTATE YOUR DEVICE</p>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="header-ui">
            <div class="stat-pill trophy" onclick="openRoad()">
                <span class="icon">🏆</span>
                <div class="pill-info">
                    <span id="p-trophies">0</span>
                    <div class="progress-bg"><div id="road-fill"></div></div>
                </div>
            </div>
            <div class="stat-pill coins">
                <span class="icon">🪙</span>
                <span id="p-coins">0</span>
                <div class="add-btn">+</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="side-panel left">
                <div class="pass-widget" onclick="openPass()">
                    <div class="pass-title">FOODIE PASS</div>
                    <div class="pass-bar-mini"><div id="pass-fill"></div></div>
                </div>
                <div id="hero-tray" class="hero-selection-grid"></div>
            </div>

            <div class="center-stage">
                <div id="hero-model" class="hero-display-large">🍔</div>
                <div class="hero-info-card">
                    <h1 id="hero-name">SIR BURGER</h1>
                    <div class="hero-tags">
                        <span id="stat-hp" class="tag hp">❤️ 1000</span>
                        <span id="stat-spd" class="tag spd">⚡ FAST</span>
                    </div>
                </div>
                <button id="btn-upgrade" class="upgrade-btn-premium" onclick="upgradeHero()">
                    <span class="up-label">UPGRADE</span>
                    <span class="up-cost">🪙 <span id="u-price">100</span></span>
                </button>
            </div>

            <div class="side-panel right">
                <div class="game-mode-card">
                    <div class="mode-badge">NEW</div>
                    <div class="mode-text">3v3 BRAWL</div>
                </div>
                <button class="play-btn-massive" onclick="startGame()">PLAY</button>
            </div>
        </div>
    </div>

    <div id="pass-modal" class="modal hidden">
        <div class="modal-window pass">
            <div class="modal-header">
                <h2>FOODIE PASS</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-area">
                <div id="pass-track" class="track"></div>
            </div>
        </div>
    </div>

    <div id="road-modal" class="modal hidden">
        <div class="modal-window road">
            <div class="modal-header">
                <h2>TROPHY ROAD</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-area">
                <div id="road-track" class="track"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
    <div id="game-ui" class="hidden">
        <div class="score-display">
            <span id="s-blue" class="t-blue">0</span> : <span id="s-red" class="t-red">0</span>
        </div>
        <div id="joy-move" class="joystick-pad"><div class="handle"></div></div>
        <div id="joy-shoot" class="joystick-pad shoot"><div class="handle"></div></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
