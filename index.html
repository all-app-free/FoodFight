<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-screen" class="screen">
        <div class="top-bar">
            <div class="stat-group left" onclick="openRoad()">
                <div class="stat-box trophy">
                    <span class="icon">🏆</span>
                    <span id="p-trophies">0</span>
                </div>
            </div>
            <div class="stat-group right">
                <div class="stat-box coins">
                    <span class="icon">🪙</span>
                    <span id="p-coins">0</span>
                </div>
            </div>
        </div>

        <div class="side-menu left">
            <button class="menu-btn orange" onclick="openPass()">
                <span class="btn-label">FOODIE PASS</span>
            </button>
            <button class="menu-btn blue" onclick="openHeroes()">
                <span class="btn-label">FOODERS</span>
            </button>
        </div>

        <div class="center-stage" onclick="openHeroes()">
            <div id="hero-model" class="main-character-emoji">🍔</div>
            <div class="character-info">
                <h2 id="hero-name">SIR BURGER</h2>
                <div class="power-level">POWER <span id="hero-lv">1</span></div>
            </div>
        </div>

        <div class="play-section">
            <div class="mode-select">
                <span class="mode-title">3v3 BRAWL</span>
            </div>
            <button class="play-btn" onclick="startGame()">PLAY</button>
        </div>
    </div>

    <div id="heroes-modal" class="modal hidden">
        <div class="modal-full">
            <div class="modal-header">
                <h1>FOODERS</h1>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div id="heroes-grid" class="heroes-grid"></div>
        </div>
    </div>

    <div id="track-modal" class="modal hidden">
        <div class="modal-full">
            <div class="modal-header">
                <h1 id="track-title">TRACK</h1>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <p class="swipe-hint">Swipe to see rewards - Completed are removed!</p>
            <div class="swipe-container">
                <div id="track-items" class="track-list"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
    </html>
