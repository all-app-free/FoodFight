<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-overlay">
        <div class="rotate-card">
            <div class="phone-3d">
                <div class="phone-face"></div>
            </div>
            <p>PLEASE ROTATE YOUR DEVICE</p>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="header-ui">
            <div class="trophy-pill" onclick="openRoad()">
                <span class="icon">🏆</span>
                <div class="pill-stats">
                    <span id="p-trophies">0</span>
                    <div class="pill-bar"><div id="road-fill"></div></div>
                </div>
            </div>
            <div class="coin-pill">
                <span class="icon">🪙</span>
                <span id="p-coins">0</span>
                <div class="add-plus">+</div>
            </div>
        </div>

        <div class="main-stage">
            <div class="left-column">
                <div class="pass-card" onclick="openPass()">
                    <div class="pass-header">FOODIE PASS</div>
                    <div class="pass-bar-container">
                        <div id="pass-fill"></div>
                    </div>
                </div>
                <div id="hero-tray" class="hero-selector"></div>
            </div>

            <div class="hero-showcase">
                <div id="hero-model" class="floating-emoji">🍔</div>
                <h1 id="hero-name">SIR BURGER</h1>
                <div class="hero-tags">
                    <span id="stat-hp" class="tag red">❤️ 1000</span>
                    <span id="stat-spd" class="tag blue">⚡ FAST</span>
                </div>
                <button id="btn-upgrade" class="upgrade-button" onclick="upgradeHero()">
                    <span class="up-label">UPGRADE</span>
                    <span class="up-price">🪙 <span id="u-price">100</span></span>
                </button>
            </div>

            <div class="right-column">
                <div class="event-card">
                    <div class="event-tag">NEW</div>
                    <div class="event-info">3v3 FOOD FIGHT</div>
                </div>
                <button class="brawl-button" onclick="startGame()">BRAWL!</button>
            </div>
        </div>
    </div>

    <div id="pass-modal" class="modal hidden">
        <div class="modal-content pass-theme">
            <div class="modal-header">
                <h2>FOODIE PASS</h2>
                <button class="close-x" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-viewport" id="pass-viewport">
                <div id="pass-track" class="reward-track"></div>
            </div>
        </div>
    </div>

    <div id="road-modal" class="modal hidden">
        <div class="modal-content road-theme">
            <div class="modal-header">
                <h2>TROPHY ROAD</h2>
                <button class="close-x" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-viewport" id="road-viewport">
                <div id="road-track" class="reward-track"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
    <div id="game-ui" class="hidden">
        <div class="battle-score">
            <span id="s-blue" class="blue-t">0</span>
            <span class="vs">VS</span>
            <span id="s-red" class="red-t">0</span>
        </div>
        <div id="joy-move" class="joystick"><div class="handle"></div></div>
        <div id="joy-shoot" class="joystick shoot-joy"><div class="handle"></div></div>
    </div>

    <script src="game.js"></script>
</body>
        </html>
