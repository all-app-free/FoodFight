<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-overlay">
        <div class="rotate-content">
            <div class="phone-icon">📱</div>
            <p>ROTATE FOR BEST EXPERIENCE</p>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="top-bar">
            <div class="trophy-road-card" onclick="openRoad()">
                <div class="road-info">
                    <span class="icon">🏆</span>
                    <span id="p-trophies">0</span>
                </div>
                <div class="road-progress-bg"><div id="road-fill"></div></div>
            </div>
            <div class="currency-container">
                <div class="coin-box">🪙 <span id="p-coins">0</span></div>
            </div>
        </div>

        <div class="main-layout">
            <div class="side-menu">
                <div class="pass-card-mini" onclick="openPass()">
                    <div class="pass-tag">PASS</div>
                    <div class="pass-prog-mini"><div id="pass-fill"></div></div>
                </div>
                <div id="fooders-list" class="hero-selector"></div>
            </div>

            <div class="hero-preview">
                <div id="hero-display" class="hero-bouncer">🍔</div>
                <h1 id="hero-name">SIR BURGER</h1>
                <div class="stats-row">
                    <span id="hero-hp-stat">❤️ 1000</span>
                    <span id="hero-spd-stat">⚡ Fast</span>
                </div>
                <button id="btn-upgrade" class="upgrade-btn" onclick="upgradeHero()">
                    <span class="up-text">UPGRADE</span>
                    <span class="up-price">🪙 <span id="u-price">100</span></span>
                </button>
            </div>

            <div class="action-zone">
                <div class="event-box">
                    <div class="event-title">3v3 BRAWL</div>
                    <div class="event-map">Kitchen Arena</div>
                </div>
                <button class="play-btn" onclick="startGame()">PLAY</button>
            </div>
        </div>
    </div>

    <div id="pass-screen" class="modal-overlay hidden">
        <div class="modal-window">
            <div class="modal-header">
                <h2>FOODIE PASS <small id="pass-tier-count">0/10</small></h2>
                <button class="close-x" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-area">
                <div id="pass-items" class="waterline-track"></div>
            </div>
        </div>
    </div>

    <div id="road-screen" class="modal-overlay hidden">
        <div class="modal-window road-theme">
            <div class="modal-header">
                <h2>TROPHY ROAD</h2>
                <button class="close-x" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-area">
                <div id="road-items" class="waterline-track"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
    <div id="game-ui" class="hidden">
        <div class="score-board">
            <div class="team-blue"><span id="s-blue">0</span></div>
            <div class="vs">VS</div>
            <div class="team-red"><span id="s-red">0</span></div>
        </div>
        <div id="joy-move" class="joystick"><div class="joy-thumb"></div></div>
        <div id="joy-shoot" class="joystick red-joy"><div class="joy-thumb"></div></div>
    </div>

    <div id="result-screen" class="modal-overlay hidden">
        <div class="result-card">
            <h1 id="res-title">VICTORY</h1>
            <div class="res-stats">
                <div class="res-item">🏆 <span id="res-trophies">+0</span></div>
                <div class="res-item">🪙 <span id="res-coins">+0</span></div>
            </div>
            <button class="continue-btn" onclick="location.reload()">EXIT</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
