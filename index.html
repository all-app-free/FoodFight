<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight: Kitchen Chaos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-device">Prosím, otočte telefon na šířku 🔄</div>

    <div id="menu-screen" class="screen">
        <div class="title-area">
            <h1>FOOD FIGHT</h1>
            <p>KITCHEN CHAOS</p>
        </div>
        <div class="character-preview">
            <div id="hero-emoji">🍔</div>
            <h2 id="hero-name">SIR BURGER</h2>
        </div>
        <button id="play-button" class="btn-main">HRAJ</button>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>

    <div id="ui-layer" class="hidden">
        <div class="score-board">
            <span id="score-blue">0</span> : <span id="score-red">0</span>
        </div>
        
        <div id="joy-left-container" class="joystick-container">
            <div class="joy-base"><div id="stick-left" class="stick"></div></div>
        </div>

        <div id="joy-right-container" class="joystick-container">
            <div class="joy-base red-joy"><div id="stick-right" class="stick"></div></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
