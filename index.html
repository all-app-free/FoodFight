<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-overlay">
        <div class="rotate-box">
            <div class="phone-model">
                <div class="phone-screen"></div>
            </div>
            <p>ROTATE TO LANDSCAPE</p>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="top-bar">
            <div class="trophy-widget" onclick="openRoad()">
                <div class="widget-icon">🏆</div>
                <div class="widget-data">
                    <span id="p-trophies">0</span>
                    <div class="mini-bar"><div id="road-fill"></div></div>
                </div>
            </div>
            <div class="currency-widget">
                <div class="coin-count">🪙 <span id="p-coins">0</span></div>
                <div class="plus-btn">+</div>
            </div>
        </div>

        <div class="main-container">
            <div class="side-nav">
                <div class="pass-button" onclick="openPass()">
                    <div class="pass-label">FOODIE PASS</div>
                    <div class="pass-progress"><div id="pass-fill"></div></div>
                </div>
                <div id="hero-list" class="hero-tray"></div>
            </div>

            <div class="stage">
                <div id="hero-render" class="hero-anim">🍔</div>
                <h1 id="hero-name">SIR BURGER</h1>
                <div class="hero-stats">
                    <span id="stat-hp">❤️ 1000</span>
                    <span id="stat-spd">⚡ FAST</span>
                </div>
                <button id="btn-upgrade" class="btn-fancy purple" onclick="upgradeHero()">
                    <span class="l-1">UPGRADE</span>
                    <span class="l-2">🪙 <span id="u-price">100</span></span>
                </button>
            </div>

            <div class="action-panel">
                <div class="mode-selector">
                    <div class="mode-tag">NEW</div>
                    <div class="mode-name">3v3 FOOD FIGHT</div>
                </div>
                <button class="btn-fancy green play-size" onclick="startGame()">BRAWL!</button>
            </div>
        </div>
    </div>

    <div id="pass-modal" class="overlay hidden">
        <div class="window">
            <div class="window-header">
                <h3>FOODIE PASS</h3>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-container" id="pass-swipe">
                <div id="pass-items" class="track"></div>
            </div>
        </div>
    </div>

    <div id="road-modal" class="overlay hidden">
        <div class="window road-alt">
            <div class="window-header">
                <h3>TROPHY ROAD</h3>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="swipe-container" id="road-swipe">
                <div id="road-items" class="track"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
    <div id="game-ui" class="hidden">
        <div class="score-pill">
            <span class="b-score" id="s-blue">0</span>
            <span class="divider">VS</span>
            <span class="r-score" id="s-red">0</span>
        </div>
        <div id="joy-move" class="ctrl-joy"><div class="thumb"></div></div>
        <div id="joy-shoot" class="ctrl-joy red-joy"><div class="thumb"></div></div>
    </div>

    <script src="game.js"></script>
</body>
    </html>
