<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight: Kitchen Chaos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-device">🔄 Otoč telefon na šířku</div>

    <div id="menu-screen" class="screen">
        <div class="top-bar">
            <div class="currency trophies">🏆 <span id="p-trophies">0</span></div>
            <div class="currency coins">🪙 <span id="p-coins">0</span></div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="foodie-pass-preview" onclick="openPass()">
                    <div class="pass-tag">FOODIE PASS</div>
                    <div class="pass-prog">Level 1/10</div>
                </div>
                <div class="fooders-list" id="fooders-list">
                    </div>
            </div>

            <div class="center-panel">
                <div id="hero-preview" class="floating">🍔</div>
                <h2 id="hero-name">SIR BURGER</h2>
                <button id="upgrade-btn" class="btn-upgrade">LEVELIT UP! (0 🪙)</button>
            </div>

            <div class="right-panel">
                <div class="mode-selector">
                    <div class="mode-info">
                        <strong>POTLUCK PARTY</strong>
                        <span>3v3 • 30 Kills</span>
                    </div>
                </div>
                <button id="play-btn" class="btn-play">HRAJ</button>
            </div>
        </div>
    </div>

    <div id="pass-screen" class="screen hidden">
        <div class="pass-header">
            <h1>FOODIE PASS - SEASON 1</h1>
            <button onclick="closePass()" class="btn-close">X</button>
        </div>
        <div class="pass-rewards" id="pass-rewards">
            </div>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
    <div id="game-ui" class="hidden">
        <div class="score-board">
            <span class="t-blue" id="s-blue">0</span> : <span class="t-red" id="s-red">0</span>
        </div>
        <div id="joy-move" class="joy-container"><div class="joy-base"><div id="stick-move" class="stick"></div></div></div>
        <div id="joy-shoot" class="joy-container"><div class="joy-base red-joy"><div id="stick-shoot" class="stick"></div></div></div>
    </div>

    <div id="result-screen" class="screen hidden">
        <h1 id="res-title">VÍTĚZSTVÍ!</h1>
        <div class="res-stats">
            <p>🪙 +<span id="res-coins">0</span></p>
            <p>🏆 +<span id="res-trophies">0</span></p>
        </div>
        <button onclick="backToMenu()" class="btn-play">POKRAČOVAT</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
