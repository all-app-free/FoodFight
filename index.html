<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Fight: Trophy Road</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-device">🔄 Otoč telefon na šířku</div>

    <div id="menu-screen" class="screen">
        <div class="top-bar">
            <div class="trophy-road-preview" onclick="openTrophyRoad()">
                <div class="road-bar"><div id="road-progress"></div></div>
                <span>🏆 <span id="p-trophies">0</span></span>
            </div>
            <div class="currency coins">🪙 <span id="p-coins">0</span></div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="foodie-pass-preview" onclick="openPass()">
                    <div class="pass-tag">FOODIE PASS</div>
                    <div class="pass-bar-bg"><div id="pass-bar-fill"></div></div>
                </div>
                <div class="fooders-list" id="fooders-list"></div>
            </div>

            <div class="center-panel">
                <div id="hero-preview" class="floating">🍔</div>
                <h2 id="hero-name">SIR BURGER</h2>
                <button id="upgrade-btn" onclick="upgradeHero()" class="btn-upgrade">VYLEPŠIT</button>
            </div>

            <div class="right-panel">
                <button onclick="startGame()" class="btn-play">HRAJ</button>
            </div>
        </div>
    </div>

    <div id="road-screen" class="screen hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>CESTA ZA SLÁVOU 🏆</h2>
                <button onclick="closeRoad()" class="btn-close">X</button>
            </div>
            <div class="road-content" id="road-items">
                </div>
        </div>
    </div>

    <div id="pass-screen" class="screen hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>FOODIE PASS 🍔</h2>
                <button onclick="closePass()" class="btn-close">X</button>
            </div>
            <div class="pass-items" id="pass-items">
                </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
    <div id="game-ui" class="hidden">
        <div class="score-board"><span id="s-blue">0</span> : <span id="s-red">0</span></div>
        <div id="joy-move" class="joy-zone"><div class="joy-base"><div id="stick-move" class="stick"></div></div></div>
        <div id="joy-shoot" class="joy-zone"><div class="joy-base red-joy"><div id="stick-shoot" class="stick"></div></div></div>
    </div>

    <div id="result-screen" class="screen hidden">
        <h1 id="res-title">VÍTĚZSTVÍ!</h1>
        <div class="res-stats">
            <p>🪙 +<span id="res-coins">0</span></p>
            <p>🏆 +<span id="res-trophies">0</span></p>
        </div>
        <button onclick="backToMenu()" class="btn-play">POKRAČOVAT</button>
    </div>

    <script src="game.js"></script>
</body>
                                                      </html>
